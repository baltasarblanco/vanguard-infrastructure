version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    network_mode: "host" # 💥 CRÍTICO: Permite a Docker ver los puertos de Pop!_OS directamente
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    network_mode: "host" # Grafana se levantará en el puerto 3000 de tu máquina
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin