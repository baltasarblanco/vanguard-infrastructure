<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RYŪ DOJO · Precision Training</title>
    <style>
        /* Estilos base del Dojo */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'SF Mono', 'Fira Code', monospace;
            overflow: hidden;
        }

        .dojo {
            background: rgba(10, 20, 30, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(0, 255, 255, 0.2);
            padding: 1.8rem;
            max-width: 1100px;
            width: 95%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid cyan;
            padding-bottom: 0.75rem;
        }

        .title h1 {
            font-size: 1.8rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #aaffff, #00ccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .status-panel {
            background: #0a121c;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: #0fa;
            border: 1px solid #0fa;
        }

        .training-area { display: flex; flex-wrap: wrap; gap: 2rem; }

        .canvas-zone {
            flex: 2;
            position: relative;
            background: #010a12;
            border-radius: 2rem;
            padding: 10px;
            box-shadow: 0 0 20px rgba(0,255,255,0.1);
        }

        canvas {
            width: 100%;
            background: #0b111c;
            border-radius: 1.5rem;
            display: block;
            cursor: none; /* Cursor nativo oculto */
        }

        /* --- CURSOR SAMURAI (PUNTERO DE LUZ) --- */
        #samurai-cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 2px solid #3affdd;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #3affdd, inset 0 0 5px #3affdd;
            z-index: 10000;
            display: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .metrics {
            flex: 1;
            min-width: 250px;
            background: #071018aa;
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid cyan;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .metric-card {
            background: #00000055;
            border-radius: 1rem;
            padding: 1rem;
            border-left: 4px solid cyan;
        }

        .metric-label { font-size: 0.7rem; color: #8bb; letter-spacing: 2px; margin-bottom: 5px; }
        .metric-value { font-size: 1.8rem; font-weight: bold; color: #0ff; text-shadow: 0 0 5px cyan; }
        
        .precision-log {
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.75rem;
            color: #8affff;
            font-family: monospace;
        }

        .dojo-controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        button {
            background: #111c26;
            border: 1px solid cyan;
            color: cyan;
            padding: 0.8rem 1.5rem;
            border-radius: 3rem;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: cyan; color: black; box-shadow: 0 0 15px cyan; }

        .flash-red { animation: redFlash 0.15s ease-in-out 2; }
        @keyframes redFlash {
            50% { box-shadow: inset 0 0 100px rgba(255,0,0,0.7), 0 0 20px red; }
        }

        .status-led {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: red;
            margin-right: 5px;
        }
        .connected { background: #0f0; box-shadow: 0 0 8px #0f0; }

    </style>
</head>
<body>

<div id="samurai-cursor"></div>

<main class="dojo">
    <div class="header">
        <div class="title">
            <h1>⚡ RYŪ · PRECISION</h1>
            <p>MODEL ALIGNMENT | KINEMATIC ANALYSIS</p>
        </div>
        <div class="status-panel">
            <span id="wsLed" class="status-led"></span>
            <span id="wsStatus">disconnected</span>
        </div>
    </div>

    <div class="training-area">
        <div class="canvas-zone" id="canvasZone">
            <canvas id="strokeCanvas" width="600" height="600"></canvas>
        </div>
        <div class="metrics">
            <div class="metric-card">
                <div class="metric-label">✍️ TRAZOS</div>
                <div class="metric-value" id="strokeCount">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">🎯 NIVEL DE PRECISIÓN</div>
                <div class="metric-value" id="precisionScore">—%</div>
                <div style="margin-top:10px; text-align: center;">
                    <svg width="100" height="100" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#1a4a5a" stroke-width="8"/>
                        <circle id="gaugeFill" cx="50" cy="50" r="40" fill="none" stroke="#3affdd" 
                                stroke-width="8" stroke-linecap="round" stroke-dasharray="251" 
                                stroke-dashoffset="251" transform="rotate(-90 50 50)" 
                                style="transition: stroke-dashoffset 0.3s, stroke 0.3s;"/>
                    </svg>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-label">📜 LOG DE PRECISIÓN</div>
                <div id="precisionLog" class="precision-log">Esperando sincronización...</div>
            </div>
        </div>
    </div>

    <div class="dojo-controls">
        <button id="clearBtn">🗑️ REINICIAR DOJO</button>
        <button id="connectBtn">🔌 CONECTAR WS</button>
        <button id="disconnectBtn">⛔ DESCONECTAR</button>
    </div>
</main>

<script>
    const WS_AEGIS_URL = "ws://127.0.0.1:9090/ryu";
    const WS_CELER_URL = "ws://127.0.0.1:9030/ws";

    let wsOut = null, wsIn = null;
    let connected = false;

    const canvas = document.getElementById('strokeCanvas');
    const ctx = canvas.getContext('2d');
    const cursor = document.getElementById('samurai-cursor');
    const gauge = document.getElementById('gaugeFill');
    const precisionText = document.getElementById('precisionScore');
    const log = document.getElementById('precisionLog');

    let drawing = false;
    let strokeCount = 0;

    // --- MANEJO DEL CURSOR ---
    window.addEventListener('mousemove', (e) => {
        cursor.style.display = 'block';
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    function initCanvas() {
        canvas.width = 600;
        canvas.height = 600;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 10;
        ctx.strokeStyle = '#3affdd';
        clearCanvas();
    }

    function clearCanvas() {
        ctx.fillStyle = '#0b111c';
        ctx.fillRect(0, 0, 600, 600);
        // Grilla de calibración
        ctx.strokeStyle = '#1a4a5a';
        ctx.lineWidth = 1;
        for(let i=150; i<600; i+=150) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 600); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(600, i); ctx.stroke();
        }
        ctx.lineWidth = 10;
        ctx.strokeStyle = '#3affdd';
    }

    // --- CAPTURA DE TRAZOS ---
    canvas.addEventListener('mousedown', (e) => {
        drawing = true;
        const pos = getCoords(e);
        ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
        sendPoint(pos.x, pos.y, 1); // ACTION_DOWN
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!drawing) return;
        const pos = getCoords(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        sendPoint(pos.x, pos.y, 0); // ACTION_MOVE
    });

    window.addEventListener('mouseup', () => {
        if (!drawing) return;
        drawing = false;
        strokeCount++;
        document.getElementById('strokeCount').innerText = strokeCount;
        sendPoint(0, 0, 2); // ACTION_UP
    });

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX - rect.left) * (600 / rect.width),
            y: (e.clientY - rect.top) * (600 / rect.height)
        };
    }

    function sendPoint(x, y, flag) {
        if (!connected || wsOut.readyState !== WebSocket.OPEN) return;
        const buf = new ArrayBuffer(13);
        const view = new DataView(buf);
        view.setFloat32(0, x, true);
        view.setFloat32(4, y, true);
        view.setFloat32(8, 1.0, true);
        view.setUint8(12, flag);
        wsOut.send(buf);
    }

    // --- CONEXIÓN DUAL ---
    function connect() {
        const btn = document.getElementById('connectBtn');
        btn.innerText = "⏳ SINCRONIZANDO...";
        
        wsOut = new WebSocket(WS_AEGIS_URL);
        wsOut.binaryType = "arraybuffer";
        wsIn = new WebSocket(WS_CELER_URL);

        wsIn.onopen = () => {
            connected = true;
            document.getElementById('wsLed').classList.add('connected');
            document.getElementById('wsStatus').innerText = 'online';
            btn.innerText = "🔌 CONECTADO";
            log.innerHTML = "<div>✅ Sincronización completa.</div>";
        };

        wsIn.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // Reacción a 'precision' y 'feedback' (Celer Rust Fields)
            if (data.precision !== undefined) {
                const p = data.precision;
                precisionText.innerText = p.toFixed(1) + "%";
                gauge.style.strokeDashoffset = 251 - (251 * (p / 100));

                // Cambio de color reactivo
                let color = "#3affdd"; // Cian por defecto
                if (p < 60) {
                    color = "#ff3131"; // Alerta Roja
                    document.getElementById('canvasZone').classList.add('flash-red');
                    setTimeout(() => document.getElementById('canvasZone').classList.remove('flash-red'), 200);
                } else if (p < 85) {
                    color = "#ffcc00"; // Advertencia Amarilla
                }
                
                ctx.strokeStyle = color;
                cursor.style.borderColor = color;
                cursor.style.boxShadow = `0 0 15px ${color}, inset 0 0 5px ${color}`;
                precisionText.style.color = color;
                gauge.style.stroke = color;
            }

            if (data.feedback && data.feedback !== "Trazo Estable") {
                log.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${data.feedback}</div>` + log.innerHTML;
            }
        };

        wsIn.onclose = () => {
            connected = false;
            document.getElementById('wsLed').classList.remove('connected');
            document.getElementById('wsStatus').innerText = 'offline';
            btn.innerText = "🔌 RECONECTAR";
        };
    }

    document.getElementById('connectBtn').onclick = connect;
    document.getElementById('disconnectBtn').onclick = () => {
        if(wsIn) wsIn.close();
        if(wsOut) wsOut.close();
    };
    document.getElementById('clearBtn').onclick = () => {
        clearCanvas();
        strokeCount = 0;
        document.getElementById('strokeCount').innerText = "0";
        precisionText.innerText = "—%";
        gauge.style.strokeDashoffset = 251;
        log.innerHTML = "Dojo reiniciado.";
    };

    initCanvas();
</script>
</body>
</html>
