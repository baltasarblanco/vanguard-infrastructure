<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYŪ - Security Dashboard</title>
    <style>
        body {
            background-color: #0d1117; color: #00ff00; font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
        }
        h1 { color: #ff3333; text-transform: uppercase; border-bottom: 2px solid #ff3333; padding-bottom: 10px;}
        .alert-box {
            background: rgba(255, 0, 0, 0.1); border: 1px solid #ff3333; 
            padding: 15px; margin-bottom: 10px; border-left: 5px solid #ff0000;
            animation: flash 0.5s ease-in-out;
        }
        .status { color: #888; margin-bottom: 20px; font-style: italic; }
        @keyframes flash { 0% { background: rgba(255,0,0,0.5); } 100% { background: rgba(255,0,0,0.1); } }
        .ip-text { font-weight: bold; color: #fff; }
    </style>
</head>
<body>
    <h1>🛡️ RYŪ Security Telemetry</h1>
    <div class="status" id="status">Intentando conectar al núcleo de Celer...</div>
    <div id="alerts"></div>

    <script>
        const statusDiv = document.getElementById('status');
        const alertsDiv = document.getElementById('alerts');
        
        // Conexión dinámica al WebSocket de Rust
        const ws = new WebSocket(`ws://${window.location.host}/ws`);

        ws.onopen = () => {
            statusDiv.innerHTML = "✅ Conectado al Puente IPC de CELER. Modo Monitor L7 Activo.";
            statusDiv.style.color = "#00ff00";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const time = new Date().toLocaleTimeString();
            
            const alertHtml = `
                <div class="alert-box">
                    [${time}] ⚠️ <strong>AMENAZA CRÍTICA INTERCEPTADA</strong><br/>
                    Origen: <span class="ip-text">${data.ip}</span><br/>
                    Firma: ${data.threat_type}<br/>
                    Volumen mitigado: ${data.packets_seen.toLocaleString()} paquetes
                </div>
            `;
            // Insertar arriba
            alertsDiv.insertAdjacentHTML('afterbegin', alertHtml);
        };

        ws.onclose = () => {
            statusDiv.innerHTML = "❌ Conexión perdida con el núcleo.";
            statusDiv.style.color = "#ff3333";
        };
    </script>
</body>
</html>
